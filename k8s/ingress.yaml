apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddear-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Ensure large payload or longer timeout is allowed for the simulation engine
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
  - host: sandbox.company-domain.local # Change this to your on-prem resolution domain
    http:
      paths:
      # Backend API Route
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port: 
              number: 8001
      # Frontend Route
      - path: /()(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port: 
              number: 80
