server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support for Single Page Applications (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend API Gateway
    location /api/ {
        # 'ddear-backend' is the docker-compose service name. 
        # In K8S, this can be overridden by Ingress, or if accessed directly it resolves correctly if the backend service name matches.
        # But generally in K8S, ingress handles this. For Docker Compose:
        proxy_pass http://ddear-backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Hide Nginx version
    server_tokens off;
}
